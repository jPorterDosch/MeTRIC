# =============================================================================
# Ruff Linting & Formatting Workflow
# =============================================================================
# Runs on every PR push. Posts/updates summary comment with ruff statistics.
#
# Installs Ruff via pip and runs custom scripts to compute a delta vs origin/main.
# Docs: https://docs.astral.sh/ruff/
# For slash commands (/ruff fix, /ruff format), see: ruff-commands.yml
#
# =============================================================================
# BEHAVIOR
# =============================================================================
#
# Posts/updates summary comment with delta-based ruff statistics:
# - Fails ONLY if NEW issues introduced (delta-based, not absolute)
# - Rewards fixing inherited issues with celebration emoji
# - Contributors not blocked for pre-existing problems in modified code
#
# Comment includes:
# - Summary card: new/fixed/inherited issue breakdown
# - Category/rule delta tables with emoji prefixes
# - Top offender: rule with biggest regression
# - Context-aware tips and auto-fix recommendations
#
# =============================================================================
# KEY DESIGN DECISIONS
# =============================================================================
#
# 1. DELTA-BASED PHILOSOPHY (Critical)
#    - Pass/fail based on NEW_ISSUES (sum of positive rule deltas)
#    - NOT based on DELTA (net change in total issues)
#    - Rationale: Contributors should only be blocked for issues THEY introduce
#    - Example: Fix 392, introduce 4 → DELTA=-388 (pass?) NO! NEW_ISSUES=4 (fail)
#
# 2. RULE-LEVEL DELTA CALCULATION (Critical)
#    - Must calculate deltas from individual rules, NOT categories
#    - Prevents masked regressions: RUF022 +4 hidden by RUF overall -6
#    - Category-level calculation misses regressions within improving categories
#
# 3. FILES_FILTER (Auto-fix Scoping)
#    - Filters fixable issues to PR-changed files only
#    - Used for auto-fix recommendations (don't suggest fixing unrelated files)
#    - Built from: git diff --name-only origin/main...HEAD
#
# 4. DESCRIPTION SANITIZATION
#    - Removes |, newlines, backticks from rule descriptions
#    - Prevents markdown table breakage in PR comments
#
# 5. ANNOTATIONS (NEW Issues Only)
#    - Generated by dedicated annotate-new-issues.sh script
#    - Runs AFTER collect-stats.sh to filter using rules_with_new_issues.txt
#    - Only annotates rules with positive deltas (new issues)
#    - Filters out inherited issues to highlight actual regressions
#    - GitHub limit: 10 annotations/step, 50/workflow
#
# 6. EMOJI CODING SYSTEM
#    - 🐛 Pyflakes/Bugbear: catches bugs
#    - 🎨 pycodestyle: style errors/warnings
#    - ⚡ pyupgrade/simplify: modern syntax
#    - 📦 isort/Ruff: import/package organization
#    - 📊 NumPy/Pandas: array/dataframe patterns
#    - Emoji flush with tag: 🐛[F401] not [🐛 F401]
#
# =============================================================================
# FUTURE ENHANCEMENTS (Not Implemented)
# =============================================================================
#
# Category Delta Table - Additional columns proposed but not implemented:
#   1. Top Rule: Most common rule in category, e.g., "RUF022 (4)"
#   2. Files: Count of affected files in category, e.g., "15"
#
# Tradeoffs:
#   - Pros: More context at a glance, helps identify issue concentration
#   - Cons: Wider table (7 cols vs 5), more jq processing, rules table already shows details
#
# Current decision: Tables are fully functional, these are nice-to-have only
#
# =============================================================================
# LOCAL USAGE
# =============================================================================
#
#   ruff check .                    # Check for linting issues
#   ruff check --fix .              # Auto-fix linting issues
#   ruff format --check .           # Check formatting
#   ruff format .                   # Auto-format files
#
# Or all at once:
#   ruff check --fix . && ruff format .
#
# TRIGGER + LIMITER POLICY:
#   - Trigger: pull_request (includes synchronize on new commits)
#   - Limiter: PR-scoped concurrency + cancel-in-progress
#   - Intent: latest-commit-wins on rapid push bursts
#
# FIXME(external): Recent zero-step Ruff failures were caused by GitHub account
# billing or spending-limit blocks before the runner executed any step. When
# the job fails with no steps, check billing before debugging Ruff or this YAML.
#
# =============================================================================

name: Ruff

on:
  pull_request:
    branches: [main]

concurrency:
  group: ruff-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Check job: runs on every PR push
  # ===========================================================================
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Install ruff
        run: pip install "ruff==0.15.2"

      # --- Format Check (PR-changed files only, delta-based) ---
      - name: Run ruff format
        id: ruff_format
        continue-on-error: true
        run: |
          # shellcheck disable=SC2086,SC2129
          mkdir -p .ruff-stats

          # Get Python files changed in this PR
          PR_FILES=$(git diff --name-only origin/main...HEAD | grep '\.py$' || true)
          FILE_COUNT=$(echo "$PR_FILES" | grep -c . || echo "0")

          if [ -z "$PR_FILES" ]; then
            echo "No Python files changed in PR"
            echo "format_files_checked=0" >> "$GITHUB_OUTPUT"
            echo "format_new=0" >> "$GITHUB_OUTPUT"
            echo "format_fixed=0" >> "$GITHUB_OUTPUT"
            echo "format_inherited=0" >> "$GITHUB_OUTPUT"
            : > .ruff-stats/format_files.txt
            exit 0
          fi

          echo "format_files_checked=$FILE_COUNT" >> "$GITHUB_OUTPUT"

          # Check formatting on PR branch
          # shellcheck disable=SC2086
          ruff format --check $PR_FILES 2>&1 | grep "^Would reformat:" | \
            sed 's/^Would reformat: //' | sort > .ruff-stats/format_pr.txt || true

          # Check formatting on main branch (same files)
          # Keep .ruff-stats in place while switching branches; it is untracked
          # and is used for PR/main comparisons below.
          git stash --quiet || true
          git checkout origin/main --quiet

          MAIN_PR_FILES=""
          for file in $PR_FILES; do
            [ -f "$file" ] && MAIN_PR_FILES="$MAIN_PR_FILES $file"
          done

          if [ -n "$MAIN_PR_FILES" ]; then
            # shellcheck disable=SC2086
            ruff format --check $MAIN_PR_FILES 2>&1 | grep "^Would reformat:" | \
              sed 's/^Would reformat: //' | sort > .ruff-stats/format_main.txt || true
          else
          # No files to check on main (e.g., all new files), so create empty format_main.txt
            : > .ruff-stats/format_main.txt
          fi
          
          git checkout - --quiet
          git stash pop --quiet 2>/dev/null || true

          # Calculate deltas
          # New: in PR but not in main (PR introduced bad formatting)
          comm -23 .ruff-stats/format_pr.txt .ruff-stats/format_main.txt > .ruff-stats/format_new.txt
          # Fixed: in main but not in PR (PR fixed formatting)
          comm -13 .ruff-stats/format_pr.txt .ruff-stats/format_main.txt > .ruff-stats/format_fixed.txt
          # Inherited: in both (pre-existing, not PR author's fault)
          comm -12 .ruff-stats/format_pr.txt .ruff-stats/format_main.txt > .ruff-stats/format_inherited.txt

          FORMAT_NEW=$(wc -l < .ruff-stats/format_new.txt | tr -d ' ')
          FORMAT_FIXED=$(wc -l < .ruff-stats/format_fixed.txt | tr -d ' ')
          FORMAT_INHERITED=$(wc -l < .ruff-stats/format_inherited.txt | tr -d ' ')

          echo "format_new=$FORMAT_NEW" >> "$GITHUB_OUTPUT"
          echo "format_fixed=$FORMAT_FIXED" >> "$GITHUB_OUTPUT"
          echo "format_inherited=$FORMAT_INHERITED" >> "$GITHUB_OUTPUT"

          # Copy new files list for display (only show files that are PR author's responsibility)
          cp .ruff-stats/format_new.txt .ruff-stats/format_files.txt

      # --- Collect Statistics ---
      - name: Collect ruff statistics
        id: stats
        run: |
          # shellcheck disable=SC2086,SC2129
          # Unset RUFF_OUTPUT_FORMAT to ensure --output-format flag works
          # (ruff-action sets this to "github" which persists)
          unset RUFF_OUTPUT_FORMAT

          # Run collection script
          .github/scripts/ruff/collect-stats.sh

          # Export stats to GitHub outputs
          source .ruff-stats/stats.env
          echo "pr_total=$PR_TOTAL" >> "$GITHUB_OUTPUT"
          echo "pr_fixable=$PR_FIXABLE" >> "$GITHUB_OUTPUT"
          echo "main_total=$MAIN_TOTAL" >> "$GITHUB_OUTPUT"
          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"
          echo "delta_str=$DELTA_STR" >> "$GITHUB_OUTPUT"
          echo "delta_fixable=$DELTA_FIXABLE" >> "$GITHUB_OUTPUT"
          echo "delta_fix_pct=$DELTA_FIX_PCT" >> "$GITHUB_OUTPUT"
          echo "new_issues=$NEW_ISSUES" >> "$GITHUB_OUTPUT"
          echo "fixed_issues=$FIXED_ISSUES" >> "$GITHUB_OUTPUT"
          echo "inherited_issues=$INHERITED_ISSUES" >> "$GITHUB_OUTPUT"
          echo "has_error_prone=$HAS_ERROR_PRONE" >> "$GITHUB_OUTPUT"
          echo "error_prone_rules=$ERROR_PRONE_RULES" >> "$GITHUB_OUTPUT"

      # --- Annotate NEW Issues Only ---
      # Generates GitHub annotations filtered to rules with positive deltas
      # Skip entirely when no new issues (avoids unnecessary script execution)
      - name: Annotate new issues
        if: steps.stats.outputs.new_issues > 0
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: .github/scripts/ruff/annotate-new-issues.sh

      # --- Build Tables ---
      - name: Build delta tables
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: .github/scripts/ruff/build-tables.sh

      # --- Build Comment Body ---
      - name: Build comment body
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Pass format stats to build script
          export FORMAT_FILES_CHECKED="${{ steps.ruff_format.outputs.format_files_checked }}"
          export FORMAT_NEW="${{ steps.ruff_format.outputs.format_new }}"
          export FORMAT_FIXED="${{ steps.ruff_format.outputs.format_fixed }}"
          export FORMAT_INHERITED="${{ steps.ruff_format.outputs.format_inherited }}"
          .github/scripts/ruff/build-comment.sh

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- ruff-pr-summary -->'

      - name: Post PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .ruff-stats/comment_body.md
          edit-mode: replace

      # --- Final Status ---
      # This step's output is what users see when clicking on a failed check
      # So we include full context here, not just in earlier steps
      - name: Check for regressions
        run: |
          echo "=== Ruff Check Summary ==="
          echo ""

          # Load all stats for comprehensive output
          NEW_ISSUES="${{ steps.stats.outputs.new_issues }}"
          FIXED_ISSUES="${{ steps.stats.outputs.fixed_issues }}"
          PR_TOTAL="${{ steps.stats.outputs.pr_total }}"
          MAIN_TOTAL="${{ steps.stats.outputs.main_total }}"
          DELTA="${{ steps.stats.outputs.delta }}"
          INHERITED="${{ steps.stats.outputs.inherited_issues }}"
          ERROR_PRONE="${{ steps.stats.outputs.error_prone_rules }}"
          FORMAT_NEW="${{ steps.ruff_format.outputs.format_new }}"

          # Show comparison
          echo "  Main branch: $MAIN_TOTAL issues"
          echo "  PR branch:   $PR_TOTAL issues (delta: $DELTA)"
          echo ""
          echo "  🔴 New:       $NEW_ISSUES (you introduced — must fix)"
          echo "  🟢 Fixed:     $FIXED_ISSUES (you fixed — thank you!)"
          echo "  ⚪ Inherited: $INHERITED (pre-existing in codebase — not your fault)"
          echo ""

          # Show which rules have new issues
          if [ "$NEW_ISSUES" -gt 0 ] && [ -f .ruff-stats/rules_with_new_issues.txt ]; then
            echo "  Rules with new issues:"
            cat .ruff-stats/rules_with_new_issues.txt | while read -r rule; do
              echo "    - $rule"
            done
            echo ""
          fi

          # Show error-prone rules if any
          if [ -n "$ERROR_PRONE" ]; then
            echo "  🐛 Error-prone rules: $ERROR_PRONE"
            echo "     (These catch real bugs, not just style issues!)"
            echo ""
          fi

          # Final verdict
          echo "=== Result ==="
          if [ "$NEW_ISSUES" -gt 0 ]; then
            echo ""
            echo "  ❌ FAILED: Introduced $NEW_ISSUES new ruff issues"
            echo ""

            # Show full ruff output for regressions only
            echo "=== Ruff Output (new issues only) ==="
            echo ""
            if [ -f .ruff-stats/new_issues_precise.json ]; then
              # new_issues_precise.json (built by collect-stats.sh) is the exact
              # set of new occurrences, matched by (code, message) with
              # one-for-one cancellation against main's counts — not just "any
              # occurrence of a rule/file that regressed somewhere", which
              # would also print pre-existing issues merely shifted by
              # unrelated edits, or moved wholesale from a renamed file.
              WS_PREFIX="${GITHUB_WORKSPACE:-$(pwd)}/"
              # Full ruff-style output: file:line:col: CODE message
              # Include URL for documentation reference
              jq -r --arg ws "$WS_PREFIX" '
                .[] |
                "\(.filename | ltrimstr($ws)):L\(.location.row):\(.location.column): \(.code) \(.message)" +
                (if .url then "\n    → \(.url)" else "" end)
              ' .ruff-stats/new_issues_precise.json 2>/dev/null || echo "(could not parse ruff output)"
            fi
            echo ""

            echo "=== To Fix ==="
            echo ""
            echo "  1. Run: ruff check --fix ."
            echo "  2. Review and commit the changes"
            echo "  3. Push to update this PR"
            echo ""
            echo "::error::Introduced $NEW_ISSUES new ruff issues (fixed $FIXED_ISSUES)"
            exit 1
          fi

          if [ "${FORMAT_NEW:-0}" -gt 0 ]; then
            echo ""
            echo "  ❌ FAILED: Introduced $FORMAT_NEW new formatting issue(s)"
            echo ""

            # Show which files need formatting
            if [ -s .ruff-stats/format_new.txt ]; then
              echo "  Files needing formatting:"
              cat .ruff-stats/format_new.txt | sed 's/^/    /'
              echo ""
            fi

            echo "  To fix:"
            echo "    1. Run: ruff format ."
            echo "    2. Commit the changes"
            echo "    3. Push to update this PR"
            echo "::error::Ruff format check failed"
            exit 1
          fi

          echo ""
          echo "  ✅ PASSED: No new issues introduced"
          if [ "$FIXED_ISSUES" -gt 0 ]; then
            echo "  🎉 Bonus: Fixed $FIXED_ISSUES pre-existing issues!"
          fi
