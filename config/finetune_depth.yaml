pretrained: ../ckpt/checkpoints.pth
load_only_encoder: False
long_context: False
fixed_length: True
resume: Null
benchmark: False
num_views : 10
num_test_views : 4
n_corres_train: 0
n_corres_test: 0

# ---------------------------------------------------------------------------
# MeTRIC depth conditioning (see src/streamvggt/depth_cond/config.py).
# The head-vs-token experiment flips depth_cond.injection and NOTHING else;
# the confound rule (manifest hash) is enforced at startup.
# ---------------------------------------------------------------------------
depth_cond:
  enabled: true
  encoder: identity        # identity | conv | mae
  injection: token         # head (CONTROL) | token (PROPOSED)
  temporal: none           # none | attention
  space: disparity
  norm: fixed              # fixed | raw   (per-frame normalization is forbidden)
  norm_constant_m: 10.0
  log_depth: true
  heads: [depth, point]    # DPT heads receiving head-injection (head arm only)
  conv_channels: 128
  token_append: false
  sim_num_points: 512      # sparse points sampled from GT depth per frame

lora:
  enabled: true
  targets: [q, k, v, o]    # ablate down to [k, v] for the minimal-hypothesis variant
  rank: 16
  alpha: 32
  dropout: 0.0

encoder_cache:
  enabled: false
  dir: ../encoder_cache

train:
  grad_checkpoint: true
  clip_len: ${num_views}

# Path to another run's manifest.json: enforce the confound rule against it at
# startup (fails unless the two runs differ only in depth_cond.injection).
compare_with_manifest: Null

# Smoke mode: skip datasets/accelerate, overfit a synthetic clip for a few
# steps and verify the loss decreases. Same entrypoint as full training.
smoke_test: false
smoke_steps: 5
smoke_num_views: 4
smoke_lr: 1e-4

train_criterion: ConfLoss(Regr3DPose(L21, norm_mode='?avg_dis'), alpha=0.2) + FinetuneLoss()
test_criterion: Regr3DPose(L21, norm_mode='?avg_dis', gt_scale=True, sky_loss_value=0) + Regr3DPose_ScaleInv(L21, norm_mode='?avg_dis', gt_scale=True, sky_loss_value=0)

allow_repeat: False

dataset1: ARKitScenes_Multi(allow_repeat=${allow_repeat}, split='train', ROOT='../data/train/processed_arkitscenes/',
  aug_crop=16, resolution=[(518, 392), (518, 336), (518, 294), (518, 266), (518, 210), (518, 154), (392, 518), (336, 518), (294, 518), (266, 518)],
  transform=SeqColorJitter, num_views=${num_views}, n_corres=${n_corres_train})

train_dataset: 4500 @ ${dataset1}
test_dataset: 1000 @ ARKitScenes_Multi(split='test', ROOT='../data/train/processed_arkitscenes/', resolution=(518, 392), num_views=${num_test_views}, seed=42, n_corres=${n_corres_test})

seed: 0
batch_size: 1
accum_iter: 1
epochs: 10
start_epoch: 0
start_step: 0
weight_decay: 0.05
lr: 1e-5
min_lr: 1e-7
warmup_epochs: 0.5
amp: 1

num_workers: 12
world_size: 1
local-rank: -1
dist_url: 'env://'
rank: 0
gpu: 0
distributed: False
dist_backend: 'nccl'

eval_freq: 1
save_freq: 0.1
max_checkpoints: 10
keep_freq: 1
print_freq: 10
print_img_freq: 50000000
num_imgs_vis: 4
save_dir: '../checkpoints'
exp_name: 'metric_depth_cond_${depth_cond.injection}'
task: 'VGGT'
logdir: ${save_dir}/${exp_name}/logs
output_dir: ${save_dir}/${exp_name}/

hydra:
  verbose: True
  run:

    dir: ${save_dir}/${exp_name}
